name: Deploy to GitHub Pages

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Supabase env
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Faltan VITE_SUPABASE_URL y/o VITE_SUPABASE_ANON_KEY."
            echo "Configúralas en Settings → Secrets and variables → Actions"
            echo "(repositorio o entorno github-pages). Nombres exactos: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY"
            exit 1
          fi
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LIVE_CLOCK_UPDATE_MS: ${{ vars.VITE_LIVE_CLOCK_UPDATE_MS || '5000' }}
          VITE_POLL_INTERVAL_MS: ${{ vars.VITE_POLL_INTERVAL_MS || '5000' }}
          VITE_TOURNAMENT_TABLE_REFRESH_MS: ${{ vars.VITE_TOURNAMENT_TABLE_REFRESH_MS || '60000' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
