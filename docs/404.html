<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Marcador Hockey</title>
    <script>
      // GitHub Pages (project site): conservar /<repo>/ como base de la SPA.
      var pathSegmentsToKeep = 1
      var l = window.location
      var parts = l.pathname.split('/').filter(Boolean)
      var base = '/' + parts.slice(0, pathSegmentsToKeep).join('/') + '/'
      if (base === '//') base = '/'
      var redirect =
        base +
        '?p=' +
        encodeURIComponent(l.pathname + l.search + l.hash)
      sessionStorage.setItem('spa-redirect', redirect)
      l.replace(l.protocol + '//' + l.host + base)
    </script>
  </head>
  <body></body>
</html>
